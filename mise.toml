[tools]
node = "22.13.0"
"npm:pnpm" = "11.3.0"
terraform = "1.6.6"
awscli = "2.34.57"

[env]
_.path = ["./node_modules/.bin"]

[tasks.install]
description = "Install workspace dependencies with pnpm"
run = "CI=true pnpm install"

[tasks."dev:frontend"]
description = "Start the Vite frontend dev server"
run = "pnpm --dir frontend dev --host 127.0.0.1"

[tasks."dev:backend"]
description = "Start the Hono backend dev server"
run = "pnpm --dir backend dev"

[tasks.dev]
description = "Start the frontend and backend dev servers"
run = "mise run dev:frontend ::: dev:backend"

[tasks."typecheck:frontend"]
description = "Typecheck the frontend"
run = "pnpm --dir frontend typecheck"

[tasks."typecheck:backend"]
description = "Typecheck the backend"
run = "pnpm --dir backend typecheck"

[tasks.typecheck]
description = "Typecheck all packages"
depends = ["typecheck:frontend", "typecheck:backend"]

[tasks."test:frontend"]
description = "Run frontend tests"
run = "pnpm --dir frontend test"

[tasks."test:backend"]
description = "Run backend tests"
run = "pnpm --dir backend test"

[tasks.test]
description = "Run all tests"
depends = ["test:frontend", "test:backend"]

[tasks."build:frontend"]
description = "Build the frontend"
run = "pnpm --dir frontend build"

[tasks."build:backend"]
description = "Build the backend"
run = "pnpm --dir backend build"

[tasks.build]
description = "Build frontend and backend"
depends = ["build:frontend", "build:backend"]

[tasks.check]
description = "Run typecheck, tests, and builds"
depends = ["typecheck", "test", "build"]

[tasks."tf:fmt"]
description = "Format all Terraform files"
run = "terraform fmt -recursive infra/terraform"

[tasks."tf:init"]
description = "Initialize Terraform"
dir = "infra/terraform"
run = "terraform init"

[tasks."tf:validate"]
description = "Validate Terraform"
dir = "infra/terraform"
depends = ["tf:init"]
run = "terraform validate"

[tasks."tf:plan"]
description = "Plan Terraform changes"
dir = "infra/terraform"
depends = ["tf:init"]
run = "terraform plan"

[tasks."tf:apply"]
description = "Apply Terraform changes"
dir = "infra/terraform"
depends = ["tf:init"]
run = "terraform apply"

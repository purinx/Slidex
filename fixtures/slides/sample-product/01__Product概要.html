<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product概要</title>
    <style>
      :root {
        color: #172033;
        background: #f7fafc;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
      }
      .slide {
        display: grid;
        min-height: 100vh;
        grid-template-columns: 1fr 0.86fr;
        gap: clamp(32px, 5vw, 72px);
        align-items: center;
        padding: clamp(42px, 7vw, 92px);
        background:
          linear-gradient(135deg, rgb(15 143 107 / 12%), transparent 48%),
          linear-gradient(180deg, #ffffff, #eef8f4);
      }
      h1 {
        margin: 0;
        max-width: 920px;
        font-size: clamp(52px, 7.8vw, 102px);
        line-height: 1;
        letter-spacing: 0;
      }
      p {
        margin: 24px 0 0;
        max-width: 760px;
        color: #526173;
        font-size: clamp(22px, 2.4vw, 34px);
        line-height: 1.45;
      }
      .badge {
        display: inline-flex;
        margin-bottom: 20px;
        border-radius: 8px;
        padding: 10px 12px;
        background: #0f8f6b;
        color: #fff;
        font-weight: 850;
      }
      .panel {
        display: grid;
        gap: 14px;
        border: 1px solid #d5e5df;
        border-radius: 8px;
        padding: 24px;
        background: rgb(255 255 255 / 82%);
      }
      .panel strong {
        color: #0f6f55;
        font-size: clamp(28px, 4vw, 54px);
      }
      .panel span {
        color: #526173;
        font-size: clamp(18px, 1.8vw, 24px);
        line-height: 1.4;
      }
      @media (max-width: 820px) {
        .slide {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="slide">
      <section>
        <span class="badge">Sample Deck</span>
        <h1>Product Launch Kit</h1>
        <p>小さなチームが新機能を発表するためのサンプルスライドデッキ。</p>
      </section>
      <section class="panel" aria-label="サンプルデッキの要点">
        <strong>3 slides</strong>
        <span>トップ画面のデッキ一覧、deck単位OG画像、スライド遷移の確認に使うfixture。</span>
      </section>
    </main>
  </body>
</html>

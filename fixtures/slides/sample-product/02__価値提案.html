<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>価値提案</title>
    <style>
      :root {
        color: #172033;
        background: #fff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
      }
      .slide {
        display: grid;
        min-height: 100vh;
        gap: clamp(28px, 4vw, 52px);
        align-content: center;
        padding: clamp(42px, 7vw, 92px);
        background: linear-gradient(180deg, #ffffff, #f4f7fb);
      }
      h1 {
        margin: 0;
        max-width: 1040px;
        font-size: clamp(44px, 6.8vw, 88px);
        line-height: 1.05;
        letter-spacing: 0;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .card {
        min-height: 220px;
        border: 1px solid #d8e3ee;
        border-radius: 8px;
        padding: 22px;
        background: #fff;
      }
      .card b {
        color: #174ea6;
        font-size: 15px;
      }
      .card h2 {
        margin: 16px 0 10px;
        font-size: clamp(24px, 2.5vw, 34px);
      }
      .card p {
        margin: 0;
        color: #5b6a7d;
        font-size: clamp(16px, 1.5vw, 21px);
        line-height: 1.45;
      }
      @media (max-width: 860px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="slide">
      <h1>レビューから共有までの摩擦を下げる</h1>
      <section class="grid" aria-label="価値提案">
        <article class="card">
          <b>01</b>
          <h2>すぐ見られる</h2>
          <p>HTMLファイルを置くだけで、ローカル開発環境のデッキとして開ける。</p>
        </article>
        <article class="card">
          <b>02</b>
          <h2>同じURLで共有</h2>
          <p>スライド番号をクエリに持たせ、レビュー対象を直接指定できる。</p>
        </article>
        <article class="card">
          <b>03</b>
          <h2>OGPで伝わる</h2>
          <p>デッキ単位のOG画像により、チャットやSNSで内容を把握しやすい。</p>
        </article>
      </section>
    </main>
  </body>
</html>

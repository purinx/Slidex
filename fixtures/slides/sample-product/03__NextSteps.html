<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NextSteps</title>
    <style>
      :root {
        color: #f8fbff;
        background: #101723;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
      }
      .slide {
        display: grid;
        min-height: 100vh;
        grid-template-columns: 0.92fr 1.08fr;
        gap: clamp(32px, 5vw, 72px);
        align-items: center;
        padding: clamp(42px, 7vw, 92px);
        background: #101723;
      }
      h1 {
        margin: 0;
        font-size: clamp(44px, 6.8vw, 88px);
        line-height: 1.05;
        letter-spacing: 0;
      }
      p {
        margin: 24px 0 0;
        color: #b7c4d5;
        font-size: clamp(20px, 2vw, 30px);
        line-height: 1.45;
      }
      ol {
        display: grid;
        gap: 14px;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      li {
        border: 1px solid rgb(255 255 255 / 18%);
        border-radius: 8px;
        padding: 18px 20px;
        background: rgb(255 255 255 / 8%);
        color: #fff;
        font-size: clamp(20px, 2vw, 28px);
        font-weight: 780;
      }
      @media (max-width: 860px) {
        .slide {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="slide">
      <section>
        <h1>Next steps</h1>
        <p>このfixtureは、複数デッキ表示とデッキ単位OG画像の動作確認に使える。</p>
      </section>
      <ol>
        <li>トップ画面でデッキカードを確認する</li>
        <li>カードから `/deck/sample-product` を開く</li>
        <li>`?slide=03` で直接リンクを確認する</li>
      </ol>
    </main>
  </body>
</html>

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ファイル命名規則</title>
    <style>
      :root {
        color: #172033;
        background: #fff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
      }
      .slide {
        display: grid;
        min-height: 100vh;
        grid-template-columns: 1fr 1fr;
        gap: clamp(34px, 5vw, 78px);
        align-items: center;
        padding: clamp(42px, 7vw, 92px);
        background: linear-gradient(135deg, #ffffff 0%, #ffffff 52%, #eef6f3 52%);
      }
      h1 {
        margin: 0;
        font-size: clamp(42px, 6.4vw, 84px);
        line-height: 1.05;
        letter-spacing: 0;
      }
      .pattern {
        margin: 28px 0 0;
        border: 1px solid #d9e3ee;
        border-radius: 8px;
        padding: 20px;
        background: #f8fbfe;
        color: #174ea6;
        font-size: clamp(26px, 3.4vw, 46px);
        font-weight: 850;
        overflow-wrap: anywhere;
      }
      .rules {
        display: grid;
        gap: 14px;
      }
      .rule {
        border-left: 8px solid #0f8f6b;
        padding: 12px 0 12px 18px;
      }
      .rule h2 {
        margin: 0 0 4px;
        font-size: clamp(21px, 2.2vw, 30px);
      }
      .rule p {
        margin: 0;
        color: #5a687c;
        font-size: clamp(16px, 1.5vw, 21px);
        line-height: 1.45;
      }
      @media (max-width: 860px) {
        .slide {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="slide">
      <section>
        <h1>順序とタイトルはファイル名から読む</h1>
        <div class="pattern">NN__ページタイトル.html</div>
      </section>
      <section class="rules" aria-label="命名規則">
        <article class="rule">
          <h2>NNは2桁以上の半角数字</h2>
          <p>数値昇順で並び、`01` と `1` のような曖昧さを避ける。</p>
        </article>
        <article class="rule">
          <h2>セパレーターは固定で `__`</h2>
          <p>番号とタイトルの境界を明確にし、表示タイトルを自動抽出する。</p>
        </article>
        <article class="rule">
          <h2>不正なHTML構成はエラー</h2>
          <p>重複番号、`index.html`、`.htm`、規則外のHTMLはデッキとして扱わない。</p>
        </article>
      </section>
    </main>
  </body>
</html>

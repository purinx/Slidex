<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>対象ユーザーとユースケース</title>
    <style>
      :root {
        color: #18243a;
        background: #f3f7fb;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
      }
      .slide {
        display: grid;
        min-height: 100vh;
        gap: clamp(28px, 4vw, 52px);
        align-content: center;
        padding: clamp(38px, 6vw, 86px);
      }
      h1 {
        margin: 0;
        max-width: 1080px;
        font-size: clamp(42px, 6.2vw, 82px);
        line-height: 1.06;
        letter-spacing: 0;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
      }
      .card {
        display: grid;
        min-height: 280px;
        align-content: space-between;
        border: 1px solid #d7e2ee;
        border-radius: 8px;
        padding: 24px;
        background: #fff;
      }
      .card h2 {
        margin: 0;
        font-size: clamp(24px, 2.6vw, 36px);
      }
      .card p {
        margin: 16px 0 0;
        color: #58687e;
        font-size: clamp(17px, 1.6vw, 22px);
        line-height: 1.45;
      }
      .tag {
        display: inline-flex;
        width: fit-content;
        border-radius: 6px;
        padding: 8px 10px;
        background: #174ea6;
        color: #fff;
        font-size: 14px;
        font-weight: 800;
      }
      @media (max-width: 880px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .card {
          min-height: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="slide">
      <h1>HTMLで作り、URLでレビューし、SNSで展開できる</h1>
      <section class="grid" aria-label="ユースケース">
        <article class="card">
          <div>
            <span class="tag">Local</span>
            <h2>開発中の確認</h2>
            <p>命名規則に沿ってHTMLを置き、Viteのdev serverでそのまま閲覧する。</p>
          </div>
        </article>
        <article class="card">
          <div>
            <span class="tag">Share</span>
            <h2>本番共有</h2>
            <p>S3に配置したデッキをmanifest経由で読み込み、特定スライドのURLを共有する。</p>
          </div>
        </article>
        <article class="card">
          <div>
            <span class="tag">Upload</span>
            <h2>ブラウザ投稿</h2>
            <p>ファイル検証、署名付きURL、完了通知を通じてアップロードを完結させる。</p>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL共有とOGP</title>
    <style>
      :root {
        color: #172033;
        background: #f7f9fc;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
      }
      .slide {
        display: grid;
        min-height: 100vh;
        gap: clamp(28px, 4vw, 54px);
        align-content: center;
        padding: clamp(38px, 6vw, 86px);
        background: linear-gradient(180deg, #f7f9fc, #eef4f9);
      }
      h1 {
        margin: 0;
        font-size: clamp(42px, 6.4vw, 84px);
        line-height: 1.05;
        letter-spacing: 0;
      }
      .flow {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
      }
      .step {
        display: grid;
        align-content: start;
        min-height: 230px;
        border: 1px solid #d8e3ee;
        border-radius: 8px;
        padding: 20px;
        background: #fff;
      }
      .step b {
        color: #174ea6;
        font-size: 15px;
      }
      .step h2 {
        margin: 14px 0 10px;
        font-size: clamp(22px, 2.2vw, 31px);
      }
      .step p {
        margin: 0;
        color: #58687d;
        font-size: clamp(16px, 1.5vw, 21px);
        line-height: 1.45;
      }
      .url {
        border-radius: 8px;
        padding: 18px 20px;
        background: #172033;
        color: #fff;
        font-size: clamp(20px, 2.5vw, 34px);
        font-weight: 800;
        overflow-wrap: anywhere;
      }
      @media (max-width: 980px) {
        .flow {
          grid-template-columns: 1fr 1fr;
        }
      }
      @media (max-width: 620px) {
        .flow {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="slide">
      <section>
        <h1>共有URLはスライド位置まで表現する</h1>
        <div class="url">/deck/{deckId}?slide=03</div>
      </section>
      <section class="flow" aria-label="OGP の流れ">
        <article class="step">
          <b>01</b>
          <h2>URL共有</h2>
          <p>デッキトップまたは特定スライドのURLを共有する。</p>
        </article>
        <article class="step">
          <b>02</b>
          <h2>クローラー</h2>
          <p>SNSやチャットツールがJavaScript実行前にHTMLを読む。</p>
        </article>
        <article class="step">
          <b>03</b>
          <h2>HTMLシェル</h2>
          <p>Honoが対象デッキやスライドのOGPメタタグを返す。</p>
        </article>
        <article class="step">
          <b>04</b>
          <h2>React起動</h2>
          <p>通常ブラウザでは同じHTMLからViteアプリが起動する。</p>
        </article>
      </section>
    </main>
  </body>
</html>

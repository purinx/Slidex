<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SlideX概要</title>
    <style>
      :root {
        color: #172033;
        background: #f5f8fc;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
      }
      .slide {
        display: grid;
        min-height: 100vh;
        grid-template-columns: 1.08fr 0.92fr;
        gap: clamp(32px, 5vw, 76px);
        align-items: center;
        padding: clamp(42px, 7vw, 92px);
        background:
          linear-gradient(135deg, rgb(23 78 166 / 10%), transparent 42%),
          linear-gradient(180deg, #ffffff, #eef4fb);
      }
      .eyebrow {
        margin: 0 0 18px;
        color: #174ea6;
        font-size: 18px;
        font-weight: 800;
      }
      h1 {
        margin: 0;
        max-width: 980px;
        font-size: clamp(54px, 8vw, 104px);
        line-height: 1;
        letter-spacing: 0;
      }
      .lead {
        margin: 26px 0 0;
        max-width: 820px;
        color: #526173;
        font-size: clamp(22px, 2.4vw, 34px);
        line-height: 1.45;
      }
      .panel {
        display: grid;
        gap: 14px;
        border: 1px solid #d7e1ee;
        border-radius: 8px;
        padding: 24px;
        background: rgb(255 255 255 / 78%);
        box-shadow: 0 28px 80px rgb(23 32 51 / 14%);
      }
      .metric {
        display: grid;
        grid-template-columns: 72px 1fr;
        gap: 14px;
        align-items: center;
        border-bottom: 1px solid #e1e8f1;
        padding-bottom: 14px;
      }
      .metric:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }
      .metric strong {
        display: grid;
        width: 72px;
        height: 72px;
        place-items: center;
        border-radius: 8px;
        background: #174ea6;
        color: #fff;
        font-size: 24px;
      }
      .metric span {
        color: #243449;
        font-size: clamp(20px, 2vw, 28px);
        font-weight: 750;
        line-height: 1.25;
      }
      @media (max-width: 820px) {
        .slide {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="slide">
      <section>
        <p class="eyebrow">Product Requirements Document</p>
        <h1>SlideX</h1>
        <p class="lead">
          連番付きHTMLファイルを、そのままブラウザで閲覧・共有できるスライドデッキとして扱うWebサービス。
        </p>
      </section>
      <section class="panel" aria-label="SlideX の要点">
        <div class="metric">
          <strong>HTML</strong>
          <span>1ファイルを1ページのスライドとして読み込む</span>
        </div>
        <div class="metric">
          <strong>S3</strong>
          <span>本番ではS3上のデッキをmanifestから表示する</span>
        </div>
        <div class="metric">
          <strong>OGP</strong>
          <span>共有URLごとに適切なメタデータを返す</span>
        </div>
      </section>
    </main>
  </body>
</html>

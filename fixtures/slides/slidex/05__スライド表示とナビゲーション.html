<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>スライド表示とナビゲーション</title>
    <style>
      :root {
        color: #172033;
        background: #101723;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
      }
      .slide {
        display: grid;
        min-height: 100vh;
        grid-template-columns: 1fr 1.05fr;
        gap: clamp(34px, 5vw, 72px);
        align-items: center;
        padding: clamp(38px, 6vw, 86px);
        background: #101723;
        color: #f8fbff;
      }
      h1 {
        margin: 0;
        font-size: clamp(42px, 6.2vw, 82px);
        line-height: 1.06;
        letter-spacing: 0;
      }
      .lead {
        margin: 22px 0 0;
        max-width: 720px;
        color: #b7c4d5;
        font-size: clamp(20px, 2vw, 30px);
        line-height: 1.45;
      }
      .viewer {
        display: grid;
        gap: 16px;
        border: 1px solid rgb(255 255 255 / 18%);
        border-radius: 8px;
        padding: 20px;
        background: rgb(255 255 255 / 8%);
      }
      .frame {
        display: grid;
        min-height: 300px;
        place-items: center;
        border-radius: 8px;
        background: #ffffff;
        color: #172033;
        font-size: clamp(26px, 3vw, 44px);
        font-weight: 850;
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .key {
        border: 1px solid rgb(255 255 255 / 20%);
        border-radius: 8px;
        padding: 14px;
        background: rgb(255 255 255 / 10%);
        text-align: center;
      }
      .key strong {
        display: block;
        margin-bottom: 4px;
        color: #fff;
        font-size: clamp(18px, 1.8vw, 24px);
      }
      .key span {
        color: #b7c4d5;
        font-size: 15px;
      }
      @media (max-width: 920px) {
        .slide {
          grid-template-columns: 1fr;
        }
        .controls {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <main class="slide">
      <section>
        <h1>表示はiframe、状態はURLSearchParams</h1>
        <p class="lead">
          スライドHTMLのCSS/JSをホストアプリから分離しながら、現在位置と直接リンクを同期する。
        </p>
      </section>
      <section class="viewer" aria-label="表示と操作">
        <div class="frame">iframe slide</div>
        <div class="controls">
          <div class="key"><strong>→ / Space</strong><span>次へ</span></div>
          <div class="key"><strong>←</strong><span>前へ</span></div>
          <div class="key"><strong>Home</strong><span>先頭</span></div>
          <div class="key"><strong>End</strong><span>最後</span></div>
        </div>
      </section>
    </main>
  </body>
</html>

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>リリーススコープ</title>
    <style>
      :root {
        color: #172033;
        background: #f7f9fc;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
      }
      .slide {
        display: grid;
        min-height: 100vh;
        gap: clamp(28px, 4vw, 50px);
        align-content: center;
        padding: clamp(38px, 6vw, 86px);
      }
      h1 {
        margin: 0;
        font-size: clamp(42px, 6.2vw, 82px);
        line-height: 1.05;
        letter-spacing: 0;
      }
      .columns {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .scope {
        border: 1px solid #d8e3ee;
        border-radius: 8px;
        padding: 22px;
        background: #fff;
      }
      .scope h2 {
        margin: 0 0 16px;
        font-size: clamp(28px, 3vw, 42px);
      }
      .scope ul {
        display: grid;
        gap: 10px;
        margin: 0;
        padding-left: 22px;
        color: #526173;
        font-size: clamp(16px, 1.5vw, 21px);
        line-height: 1.35;
      }
      .must {
        border-top: 8px solid #174ea6;
      }
      .should {
        border-top: 8px solid #0f8f6b;
      }
      .could {
        border-top: 8px solid #7b5ac8;
      }
      @media (max-width: 920px) {
        .columns {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="slide">
      <h1>初期リリースは「閲覧・アップロード・OGP」まで</h1>
      <section class="columns" aria-label="初期リリース範囲">
        <article class="scope must">
          <h2>Must</h2>
          <ul>
            <li>Vite + React + TypeScript</li>
            <li>ファイル名パーサー</li>
            <li>ローカル / S3 manifest 読み込み</li>
            <li>署名付きURLアップロード</li>
            <li>iframe表示と直接リンク</li>
          </ul>
        </article>
        <article class="scope should">
          <h2>Should</h2>
          <ul>
            <li>スライド一覧パネル</li>
            <li>共有URLコピー</li>
            <li>OGPプレビューUI</li>
            <li>Playwright E2E</li>
            <li>manifest生成CLI</li>
          </ul>
        </article>
        <article class="scope could">
          <h2>Could</h2>
          <ul>
            <li>複数デッキ対応</li>
            <li>発表者モード</li>
            <li>フルスクリーン</li>
            <li>テーマ切り替え</li>
            <li>OGP画像自動生成</li>
          </ul>
        </article>
      </section>
    </main>
  </body>
</html>

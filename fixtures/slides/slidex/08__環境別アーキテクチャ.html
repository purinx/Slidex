<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>環境別アーキテクチャ</title>
    <style>
      :root {
        color: #172033;
        background: #f5f8fc;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
      }
      .slide {
        display: grid;
        min-height: 100vh;
        gap: clamp(28px, 4vw, 50px);
        align-content: center;
        padding: clamp(38px, 6vw, 86px);
      }
      h1 {
        margin: 0;
        font-size: clamp(42px, 6.2vw, 82px);
        line-height: 1.05;
        letter-spacing: 0;
      }
      .columns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }
      .env {
        border: 1px solid #d7e2ee;
        border-radius: 8px;
        padding: 24px;
        background: #fff;
      }
      .env h2 {
        margin: 0 0 18px;
        font-size: clamp(28px, 3vw, 42px);
      }
      .lane {
        display: grid;
        grid-template-columns: 1fr 40px 1fr;
        gap: 10px;
        align-items: center;
        margin-top: 14px;
      }
      .box {
        min-height: 76px;
        border-radius: 8px;
        padding: 14px;
        background: #eef5ff;
        color: #173a75;
        font-size: clamp(16px, 1.5vw, 21px);
        font-weight: 760;
      }
      .prod .box {
        background: #eef8f4;
        color: #17623f;
      }
      .arrow {
        color: #63748a;
        font-size: 28px;
        text-align: center;
      }
      .note {
        margin: 18px 0 0;
        color: #5b6a7e;
        font-size: clamp(16px, 1.5vw, 21px);
        line-height: 1.45;
      }
      @media (max-width: 860px) {
        .columns {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="slide">
      <h1>取得元だけを環境で切り替える</h1>
      <section class="columns" aria-label="開発環境と本番環境">
        <article class="env">
          <h2>Development</h2>
          <div class="lane">
            <div class="box">VITE_SLIDES_DIR</div>
            <div class="arrow">→</div>
            <div class="box">/__slides</div>
          </div>
          <p class="note">Vite middleware がローカルディレクトリを列挙し、HTMLを静的配信する。</p>
        </article>
        <article class="env prod">
          <h2>Production</h2>
          <div class="lane">
            <div class="box">S3 manifest</div>
            <div class="arrow">→</div>
            <div class="box">/api/decks/{id}</div>
          </div>
          <p class="note">manifest方式でS3 ListObjectsを避け、Hono APIとOGP生成を同一基盤に集約する。</p>
        </article>
      </section>
    </main>
  </body>
</html>
